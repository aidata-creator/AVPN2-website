<style>
    :root {
        --primary: #F1A721;            /* Warm Gold/Orange */
        --primary-hover: #D98E0D;      /* Hover Gold */
        --bg-dark: #0B1D28;           /* Deep dark blue sampled from banner */
        --bg-dark-alt: #162A38;       /* Gradient secondary dark blue */
        --card-bg: #132431;           /* Elevated card background */
        --border-glow: #243B4D;       /* Subtle card outline */
        --text-light: #FFFFFF;        /* Bright white text */
        --text-muted: #A0B2C6;        /* Muted secondary text */
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-dark-alt) 100%) !important;
        background-attachment: fixed;
        color: var(--text-light);
        line-height: 1.6;
    }

    /* Hero Banner Container - Full Bleed */
    .hero-banner {
        width: 100%;
        background: var(--bg-dark);
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: 1px solid var(--border-glow);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .hero-banner img {
        width: 100%;
        max-width: 1200px;
        height: auto;
        display: block;
    }

    .container {
        max-width: 960px; /* Slightly widened for better side-by-side card proportions */
        margin: 3rem auto;
        padding: 0 1.5rem;
    }

    h2 {
        color: var(--primary);
    }

    .text-muted {
        color: var(--text-muted);
    }

    /* Balanced 2x2 Grid Layout */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
        gap: 1.5rem;
        margin-top: 2rem;
    }

    @media (max-width: 768px) {
        .grid {
            grid-template-columns: 1fr; /* Single column on mobile devices */
        }
    }

    .card {
        background: var(--card-bg);
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border-glow);
        border-top: 4px solid var(--primary);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .card h3 {
        margin-top: 0;
        color: var(--primary);
    }

    .card p {
        color: var(--text-muted);
    }

    .btn-group {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 1rem;
    }

    .btn {
        display: inline-block;
        text-align: center;
        background-color: var(--primary);
        color: #0B1D28;
        padding: 0.65rem 1rem;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 700;
        transition: all 0.2s ease;
    }

    .btn:hover {
        background-color: var(--primary-hover);
    }

    .btn-outline {
        background-color: transparent;
        color: var(--primary);
        border: 2px solid var(--primary);
    }

    .btn-outline:hover {
        background-color: var(--primary);
        color: #0B1D28;
    }

    footer {
        margin-top: 4rem;
        padding: 2rem;
        background: rgba(11, 29, 40, 0.95);
        border-top: 1px solid var(--border-glow);
        text-align: center;
    }

    .share-section {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin-top: 1rem;
    }
</style>
